<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular background -->
  <circle cx="96" cy="96" r="96" fill="url(#bgGradient)"/>
  
  <!-- Accent circle border -->
  <circle cx="96" cy="96" r="96" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  
  <!-- "AM" Text - Bold and Large -->
  <text 
    x="96" 
    y="120" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-size="86" 
    font-weight="900" 
    fill="#ffffff" 
    text-anchor="middle" 
    dominant-baseline="middle"
    letter-spacing="-2"
  >AM</text>
  
  <!-- Subtle accent line underneath -->
  <line x1="50" y1="140" x2="142" y2="140" stroke="#3b82f6" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
</svg>